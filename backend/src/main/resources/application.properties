spring.application.name=hrm

spring.datasource.url=jdbc:postgresql://localhost:5432/hrm
spring.datasource.username=postgres
spring.datasource.password=sa
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ========== JWT Configuration ==========
# Secret key dùng để ký JWT (Base64-encoded, tối thiểu 256-bit cho HS256)
# QUAN TRỌNG: Trong production, dùng biến môi trường thay vì hard-code
jwt.secret-key=dGhpc0lzQVNlY3JldEtleUZvckhSTUFwcGxpY2F0aW9uMjAyNlNXUDM5MQ==
# Thời gian hết hạn token (milliseconds) - 1 giờ = 3600000ms
jwt.expiration-ms=3600000
